
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player — Just Dink It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <div id="player-content" style="padding: 56px 0;">
    <div class="container">
      <p class="text-mute" style="text-align: center;">Loading player...</p>
    </div>
  </div>

  <div id="footer"></div>

  <script type="module">
    import { mountChrome, apiGet } from '/js/shared.js';

    mountChrome('');

    const slug = new URLSearchParams(location.search).get('slug')
      || location.pathname.replace(/^\/players\//, '').replace(/\/$/, '') || null;

    async function load() {
      if (!slug || slug === 'player.html') return;
      try {
        const data = await apiGet(`public-data?action=player&slug=${encodeURIComponent(slug)}`);
        if (!data.player) {
          document.getElementById('player-content').innerHTML = `
            <div class="container"><p class="text-mute" style="text-align: center;">Player not found.</p></div>`;
          return;
        }
        render(data.player);
      } catch (err) {
        console.error('Player page error:', err);
        document.getElementById('player-content').innerHTML = `
          <div class="container"><p class="text-mute" style="text-align: center;">Error loading player: ${err.message}</p></div>`;
      }
    }

    function render(p) {
      const cs = p.careerStats || {};
      const winPct = (cs.wins + cs.losses) > 0 ? Math.round((cs.wins / (cs.wins + cs.losses)) * 100) : 0;
      const pointDiff = (cs.pointsFor || 0) - (cs.pointsAgainst || 0);
      const initials = p.name.split(' ').map(w => w[0]).slice(0, 2).join('');

      document.getElementById('player-content').innerHTML = `
        <div class="container-narrow">

          <!-- Player header -->
          <div class="card-dark" style="padding: 32px;">
            <div class="flex items-center gap-24" style="flex-wrap: wrap;">
              <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--c-coral); display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-serif); font-style: italic; font-size: 44px; overflow: hidden; border: 3px solid var(--c-amber);">
                ${p.headshot ? `<img src="${p.headshot}" alt="${p.name}" style="width: 100%; height: 100%; object-fit: cover;"/>` : initials}
              </div>
              <div style="flex: 1;">
                <p class="eyebrow" style="color: var(--c-amber);">Career profile</p>
                <h1 class="h-display" style="color: var(--c-cream); font-size: 44px; margin-top: 4px;">${p.name}</h1>
                <p style="margin: 8px 0 0; color: var(--c-teal-light); font-size: 14px;">
                  ${cs.seasons || 0} season${cs.seasons === 1 ? '' : 's'} · joined ${new Date(p.joinedDate).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                  ${p.dupr ? ` · DUPR ${p.dupr}` : ''}
                </p>
                ${p.bio ? `<p style="margin: 12px 0 0; font-size: 13px; color: var(--c-teal-light); max-width: 480px; line-height: 1.5;">${p.bio}</p>` : ''}
              </div>
            </div>
          </div>

          <!-- Career stats -->
          <p class="eyebrow mt-32">Career numbers</p>
          <h2 class="h-section mt-8">All seasons. <em>One legacy.</em></h2>

          <div class="grid-4 mt-16">
            <div class="card">
              <p class="eyebrow">Matches</p>
              <p class="serif-num" style="font-size: 36px; margin-top: 6px;">${cs.matchesPlayed || 0}</p>
            </div>
            <div class="card">
              <p class="eyebrow">Record</p>
              <p class="serif-num" style="font-size: 36px; margin-top: 6px;">${cs.wins || 0}–${cs.losses || 0}</p>
            </div>
            <div class="card">
              <p class="eyebrow">Win %</p>
              <p class="serif-num" style="font-size: 36px; margin-top: 6px;">${winPct}%</p>
            </div>
            <div class="card">
              <p class="eyebrow">Point diff</p>
              <p class="serif-num" style="font-size: 36px; margin-top: 6px; color: ${pointDiff >= 0 ? 'var(--c-teal)' : 'var(--c-coral-dark)'};">${pointDiff >= 0 ? '+' : ''}${pointDiff}</p>
            </div>
          </div>

          <!-- Team history -->
          <p class="eyebrow mt-32">Team history</p>
          <h2 class="h-section mt-8">Where they've played.</h2>

          <div class="card mt-16" style="padding: 0;">
            ${cs.teams && cs.teams.length > 0 ? cs.teams.map((t, i) => `
              <a href="/teams/${t.teamSlug}" style="display: flex; padding: 16px 20px; border-bottom: ${i === cs.teams.length - 1 ? '0' : '0.5px solid var(--c-rule)'}; text-decoration: none; align-items: center; gap: 16px; transition: background 0.15s;" onmouseover="this.style.background='var(--c-cream)'" onmouseout="this.style.background=''">
                <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--c-coral);"></div>
                <div style="flex: 1;">
                  <p style="margin: 0; font-size: 14px; font-weight: 500;">${t.teamName}</p>
                  <p style="margin: 0; font-size: 12px; color: var(--c-ink-mute);">${t.seasonName}</p>
                </div>
                <span style="font-size: 12px; color: var(--c-coral);">View team →</span>
              </a>
            `).join('') : `<p class="text-mute" style="padding: 20px; text-align: center; font-size: 13px;">No team history yet.</p>`}
          </div>

          <p class="text-mute mt-32" style="font-size: 12px; text-align: center; font-style: italic; font-family: var(--font-serif);">
            "Stats follow the player, not the team. Welcome to the South Bay legacy book."
          </p>

        </div>
      `;
    }

    load();
  </script>
</body>
</html>
