<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Just Dink It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <section style="padding: 48px 0;">
    <div class="container">
      <p class="eyebrow">The schedule</p>
      <h1 class="h-display" style="font-size: 44px; margin-top: 6px;">Six weeks. <em>Every match.</em></h1>
      <p class="text-soft" style="margin-top: 12px; font-size: 14px;">Round robin runs Wk 1–6, playoffs Wk 7+. Filter by division below.</p>

      <div id="division-filters" class="flex gap-8 mt-24" style="flex-wrap: wrap;"></div>
      <div id="schedule-content" class="mt-24"></div>
    </div>
  </section>

  <div id="footer"></div>

  <script type="module">
    import { mountChrome, apiGet, fmtDate, matchResult } from '/js/shared.js';
    mountChrome('schedule');

    let allData = null;
    let activeFilter = 'all';

    async function load() {
      try {
        allData = await apiGet('public-data?action=season-overview');
        renderFilters();
        renderSchedule();
      } catch {
        document.getElementById('schedule-content').innerHTML =
          '<p class="text-mute" style="text-align: center; padding: 32px;">Schedule will appear once the season is set up.</p>';
      }
    }

    function renderFilters() {
      const container = document.getElementById('division-filters');
      container.innerHTML = [
        `<span class="pill ${activeFilter === 'all' ? 'pill-amber' : 'pill-teal'}" data-filter="all" style="cursor: pointer;">All divisions</span>`,
        ...(allData.divisions || []).map(d =>
          `<span class="pill ${activeFilter === d.id ? 'pill-amber' : 'pill-teal'}" data-filter="${d.id}" style="cursor: pointer;">${d.name} Division</span>`
        ),
      ].join('');
      container.querySelectorAll('[data-filter]').forEach(el => {
        el.addEventListener('click', () => {
          activeFilter = el.dataset.filter;
          renderFilters();
          renderSchedule();
        });
      });
    }

    function teamById(id) { return (allData.teams || []).find(t => t.id === id); }

    function renderSchedule() {
      const target = document.getElementById('schedule-content');
      let matches = allData.matches || [];
      if (activeFilter !== 'all') matches = matches.filter(m => m.divisionId === activeFilter);

      if (matches.length === 0) {
        target.innerHTML = '<p class="text-mute" style="text-align: center; padding: 32px;">No matches scheduled in this division.</p>';
        return;
      }

      const byWeek = {};
      for (const m of matches) {
        const w = m.week || 0;
        if (!byWeek[w]) byWeek[w] = [];
        byWeek[w].push(m);
      }

      const weeks = Object.keys(byWeek).sort((a, b) => Number(a) - Number(b));

      target.innerHTML = weeks.map(week => {
        const isRivalry = Number(week) === 6;
        const isPlayoff = Number(week) >= 7;
        const weekClass = isRivalry ? 'card-dark' : isPlayoff ? 'card-coral' : 'card';
        const weekDate = byWeek[week][0]?.date ? fmtDate(byWeek[week][0].date) : '';
        return `
          <div class="${weekClass} mb-16" style="padding: 20px;">
            <div class="flex justify-between items-center mb-16">
              <div>
                <p class="eyebrow ${isRivalry ? '' : 'eyebrow-amber'}" ${isRivalry ? 'style="color: var(--c-amber);"' : ''}>Week ${week}</p>
                <h2 style="margin: 4px 0 0; font-family: var(--font-serif); font-style: italic; font-size: 22px; ${isRivalry ? 'color: var(--c-cream);' : 'color: var(--c-teal-dark);'}">
                  ${isRivalry ? '⚔ Rivalry Week' : isPlayoff ? 'Playoffs' : weekDate}
                </h2>
              </div>
              <span style="font-size: 11px; ${isRivalry ? 'color: var(--c-teal-light);' : 'color: var(--c-ink-mute);'};">${byWeek[week].length} match${byWeek[week].length === 1 ? '' : 'es'}</span>
            </div>

            <div class="grid-2">
              ${byWeek[week].map(m => {
                const home = teamById(m.homeTeamId);
                const away = teamById(m.awayTeamId);
                const isFinal = m.status === 'final';
                let homeWins = 0, awayWins = 0, homeMP = 0, awayMP = 0, mr = null;
                if (isFinal && m.finalScore) {
                  mr = matchResult(m.finalScore);
                  homeWins = mr.homeGW; awayWins = mr.awayGW;
                  homeMP = mr.homeMP; awayMP = mr.awayMP;
                }
                const homeWon = homeMP > awayMP;
                const bg = isRivalry ? 'background: rgba(255,255,255,0.08); color: var(--c-cream);' : 'background: var(--c-paper);';
                const mutedColor = isRivalry ? 'var(--c-teal-light)' : 'var(--c-ink-mute)';
                return `
                  <div style="${bg} padding: 14px; border-radius: var(--r-md); ${isFinal ? 'cursor: pointer;' : ''}" ${isFinal ? `data-toggle-scores="${m.id}"` : ''}>
                    <div class="flex justify-between" style="font-size: 11px; color: ${mutedColor}; margin-bottom: 8px;">
                      <span>${fmtDate(m.date)}${m.court ? ` · ${m.court}` : ''}</span>
                      ${isFinal
                        ? `<span class="flex items-center gap-4" style="color: var(--c-amber); font-weight: 500;">FINAL <span style="font-size: 9px; opacity: 0.7;">▼</span></span>`
                        : `<span style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;">Upcoming</span>`}
                    </div>
                    <div class="flex justify-between items-center" style="font-size: 14px;">
                      <a href="${home ? `/teams/${home.slug}` : '#'}" style="color: inherit; text-decoration: none; flex: 1; ${isFinal && homeWon ? 'font-weight: 600;' : ''}" onclick="event.stopPropagation();">${home?.name || 'TBD'}</a>
                      <span class="serif-num" style="font-size: 18px; ${isRivalry ? 'color: var(--c-amber);' : ''} ${isFinal && homeWon ? 'font-weight: 700;' : ''}">${isFinal ? homeMP : ''}</span>
                    </div>
                    <div class="flex justify-between items-center" style="font-size: 14px; margin-top: 4px;">
                      <a href="${away ? `/teams/${away.slug}` : '#'}" style="color: inherit; text-decoration: none; flex: 1; ${isFinal && !homeWon ? 'font-weight: 600;' : ''}" onclick="event.stopPropagation();">${away?.name || 'TBD'}</a>
                      <span class="serif-num" style="font-size: 18px; ${isRivalry ? 'color: var(--c-amber);' : ''} ${isFinal && !homeWon ? 'font-weight: 700;' : ''}">${isFinal ? awayMP : ''}</span>
                    </div>
                    ${isFinal && mr ? `
                      <div class="score-detail" id="scores-${m.id}" style="display: none; margin-top: 12px; padding-top: 10px; border-top: 1px solid ${isRivalry ? 'rgba(255,255,255,0.15)' : 'var(--c-rule)'};">
                        ${mr.rounds ? mr.rounds.map((round, ri) => {
                          let rHGW = 0, rAGW = 0;
                          return `
                          <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: ${mutedColor}; margin: ${ri > 0 ? '10px' : '0'} 0 4px; font-weight: 600;">Round ${ri + 1}</p>
                          <table style="width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 4px;">
                            <thead>
                              <tr style="color: ${mutedColor}; text-transform: uppercase; font-size: 9px; letter-spacing: 0.06em;">
                                <th style="text-align: left; padding: 2px 4px;">Game</th>
                                <th style="text-align: center; padding: 2px 4px;">${home?.name || 'Home'}</th>
                                <th style="text-align: center; padding: 2px 4px;">${away?.name || 'Away'}</th>
                              </tr>
                            </thead>
                            <tbody>
                              ${round.games.map((g, i) => {
                                const hs = g.home.score, as = g.away.score;
                                const hWon = hs > as;
                                if (hWon) rHGW++; else rAGW++;
                                const types = ['WD','MD','MXD','MXD','MXD','MXD'];
                                return `
                                  <tr style="border-top: 0.5px solid ${isRivalry ? 'rgba(255,255,255,0.1)' : 'var(--c-rule)'};">
                                    <td style="padding: 3px 4px; color: ${mutedColor}; font-size: 10px;">G${i+1} ${types[i]}</td>
                                    <td style="text-align: center; padding: 3px 4px; ${hWon ? 'font-weight: 600;' : ''}">${hs}</td>
                                    <td style="text-align: center; padding: 3px 4px; ${!hWon ? 'font-weight: 600;' : ''}">${as}</td>
                                  </tr>
                                `;
                              }).join('')}
                              <tr style="border-top: 1px solid ${isRivalry ? 'rgba(255,255,255,0.2)' : 'var(--c-rule-strong)'}; font-weight: 600; font-size: 11px;">
                                <td style="padding: 3px 4px;">GW</td>
                                <td style="text-align: center; padding: 3px 4px;">${rHGW}</td>
                                <td style="text-align: center; padding: 3px 4px;">${rAGW}</td>
                              </tr>
                            </tbody>
                          </table>`;
                        }).join('') : `
                          <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
                            <tbody>
                              ${mr.allGames.map((g, i) => `
                                <tr style="border-top: 0.5px solid ${isRivalry ? 'rgba(255,255,255,0.1)' : 'var(--c-rule)'};">
                                  <td style="padding: 3px 4px; color: ${mutedColor};">G${i+1}</td>
                                  <td style="text-align: center; padding: 3px 4px; ${g.homeScore > g.awayScore ? 'font-weight: 600;' : ''}">${g.homeScore}</td>
                                  <td style="text-align: center; padding: 3px 4px; ${g.awayScore > g.homeScore ? 'font-weight: 600;' : ''}">${g.awayScore}</td>
                                </tr>
                              `).join('')}
                            </tbody>
                          </table>
                        `}
                      </div>
                    ` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      // Wire up expandable score details
      target.querySelectorAll('[data-toggle-scores]').forEach(card => {
        card.addEventListener('click', (e) => {
          const detail = document.getElementById(`scores-${card.dataset.toggleScores}`);
          if (!detail) return;
          const arrow = card.querySelector('.flex.items-center.gap-4 span:last-child');
          if (detail.style.display === 'none') {
            detail.style.display = 'block';
            if (arrow) arrow.textContent = '▲';
          } else {
            detail.style.display = 'none';
            if (arrow) arrow.textContent = '▼';
          }
        });
      });
    }

    load();
  </script>
</body>
</html>
