<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scores — Just Dink It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <section style="padding: 48px 0;">
    <div class="container">
      <p class="eyebrow">The scoreboard</p>
      <h1 class="h-display" style="font-size: 44px; margin-top: 6px;">Every match. <em>Every week.</em></h1>
      <p class="text-soft" style="margin-top: 12px; font-size: 14px;">Match results across both divisions. Click any team to see their full season.</p>

      <!-- Division filter -->
      <div id="division-filters" class="flex gap-8 mt-24" style="flex-wrap: wrap;">
        <span class="pill pill-amber" data-filter="all" style="cursor: pointer;">All divisions</span>
      </div>

      <div id="scores-container" class="mt-24">
        <p class="text-mute" style="text-align: center; padding: 32px;">Loading scores...</p>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script type="module">
    import { mountChrome, apiGet, fmtDate, matchResult } from '/js/shared.js';

    mountChrome('scores');

    let allData = null;
    let activeFilter = 'all';

    async function load() {
      try {
        const data = await apiGet('public-data?action=season-overview');
        allData = data;
        renderFilters();
        renderScores();
      } catch (e) {
        document.getElementById('scores-container').innerHTML =
          '<p class="text-mute" style="text-align: center;">No scores yet — season hasn\'t started.</p>';
      }
    }

    function renderFilters() {
      const container = document.getElementById('division-filters');
      const buttons = [
        `<span class="pill ${activeFilter === 'all' ? 'pill-amber' : 'pill-teal'}" data-filter="all" style="cursor: pointer;">All divisions</span>`,
        ...(allData.divisions || []).map(d =>
          `<span class="pill ${activeFilter === d.id ? 'pill-amber' : 'pill-teal'}" data-filter="${d.id}" style="cursor: pointer;">${d.name} Division</span>`
        ),
      ];
      container.innerHTML = buttons.join('');
      container.querySelectorAll('[data-filter]').forEach(el => {
        el.addEventListener('click', () => {
          activeFilter = el.dataset.filter;
          renderFilters();
          renderScores();
        });
      });
    }

    function teamById(id) { return (allData.teams || []).find(t => t.id === id); }

    function renderScores() {
      const container = document.getElementById('scores-container');
      let matches = allData.matches || [];

      if (activeFilter !== 'all') {
        matches = matches.filter(m => m.divisionId === activeFilter);
      }

      if (matches.length === 0) {
        container.innerHTML = '<p class="text-mute" style="text-align: center; padding: 32px;">No matches in this division yet.</p>';
        return;
      }

      // Group by week
      const byWeek = {};
      for (const m of matches) {
        const w = m.week || 0;
        if (!byWeek[w]) byWeek[w] = [];
        byWeek[w].push(m);
      }

      const weeks = Object.keys(byWeek).sort((a, b) => Number(b) - Number(a));

      container.innerHTML = weeks.map(week => `
        <div class="mb-24">
          <div class="flex justify-between items-center mb-16" style="padding-bottom: 8px; border-bottom: 1px solid var(--c-rule);">
            <h2 style="margin: 0; font-family: var(--font-serif); font-style: italic; font-size: 24px; color: var(--c-teal-dark);">
              Week ${week}${Number(week) === 6 ? ' · ⚔ Rivalry' : ''}
            </h2>
            <span class="text-mute" style="font-size: 12px;">${byWeek[week].length} match${byWeek[week].length === 1 ? '' : 'es'}</span>
          </div>

          <div class="grid-2">
            ${byWeek[week].map(renderMatch).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderMatch(m) {
      const home = teamById(m.homeTeamId);
      const away = teamById(m.awayTeamId);
      const homeColor = home?.colors?.primary || '#888780';
      const awayColor = away?.colors?.primary || '#888780';

      const isFinal = m.status === 'final';
      let homeMP = 0, awayMP = 0, mr = null;

      if (isFinal && m.finalScore) {
        mr = matchResult(m.finalScore);
        homeMP = mr.homeMP;
        awayMP = mr.awayMP;
      }

      const homeWon = isFinal && homeMP > awayMP;
      const awayWon = isFinal && awayMP > homeMP;

      return `
        <div class="card" style="padding: 16px;">
          <div class="flex justify-between items-center mb-8">
            <span class="text-mute" style="font-size: 11px;">${fmtDate(m.date)}${m.court ? ` · ${m.court}` : ''}</span>
            <span class="pill ${isFinal ? 'pill-teal' : 'pill-live'}" style="font-size: 9px; padding: 3px 8px;">
              ${isFinal ? 'FINAL' : m.status === 'awaiting_confirmation' ? 'CONFIRMING' : m.status === 'disputed' ? 'DISPUTED' : 'SCHEDULED'}
            </span>
          </div>

          <div style="display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;">
            <a href="${home ? `/teams/${home.slug}` : '#'}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; ${homeWon ? 'font-weight: 500;' : awayWon ? 'opacity: 0.6;' : ''}">
              <div style="width: 28px; height: 28px; border-radius: var(--r-sm); background: ${homeColor}; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500;">
                ${home ? home.name.split(' ').map(w => w[0]).slice(0, 2).join('') : '?'}
              </div>
              <span style="font-size: 14px;">${home?.name || 'TBD'}</span>
            </a>
            <span class="serif-num" style="font-size: 22px; color: ${homeWon ? 'var(--c-teal-dark)' : 'var(--c-ink-mute)'};">${isFinal ? homeMP : '—'}</span>
          </div>

          <div style="display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; margin-top: 8px;">
            <a href="${away ? `/teams/${away.slug}` : '#'}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; ${awayWon ? 'font-weight: 500;' : homeWon ? 'opacity: 0.6;' : ''}">
              <div style="width: 28px; height: 28px; border-radius: var(--r-sm); background: ${awayColor}; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500;">
                ${away ? away.name.split(' ').map(w => w[0]).slice(0, 2).join('') : '?'}
              </div>
              <span style="font-size: 14px;">${away?.name || 'TBD'}</span>
            </a>
            <span class="serif-num" style="font-size: 22px; color: ${awayWon ? 'var(--c-teal-dark)' : 'var(--c-ink-mute)'};">${isFinal ? awayMP : '—'}</span>
          </div>

          ${isFinal && mr ? `
            <div class="text-mute mt-8" style="font-size: 11px; padding-top: 8px; border-top: 0.5px solid var(--c-rule);">
              Games won: ${mr.homeGW}–${mr.awayGW} · Points: ${mr.homePts}–${mr.awayPts}
            </div>
          ` : ''}
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
