<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <style>
    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .team-card {
      background: rgba(245,235,212,0.04);
      border: 1px solid rgba(245,235,212,0.1);
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s var(--ease), border-color 0.2s var(--ease);
    }
    .team-card:hover { transform: translateY(-2px); border-color: rgba(232,181,66,0.3); }
    .team-card.featured {
      background: rgba(232,181,66,0.08);
      border-color: rgba(232,181,66,0.35);
    }

    .team-photo {
      aspect-ratio: 4 / 3;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 16px;
      overflow: hidden;
    }
    /* Background gradient slot — replaced by team photo when uploaded */
    .team-photo .bg-gradient {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .team-photo .monogram {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; font-weight: 500; letter-spacing: -0.04em;
      color: rgba(245,235,212,0.13);
      z-index: 1;
    }
    .team-photo.featured-photo .monogram { color: rgba(13,59,64,0.2); }
    .team-photo .badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(245,235,212,0.9);
      color: var(--teal-900);
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      border-radius: var(--radius-sm);
      z-index: 2;
    }
    .team-photo .badge-gold {
      background: rgba(232,181,66,0.95);
      color: var(--teal-900);
    }
    .team-photo .featured-stripe {
      position: absolute;
      top: -1px; right: -1px;
      background: var(--gold);
      color: var(--teal-900);
      padding: 6px 14px;
      font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
      z-index: 3;
    }
    .team-photo .meta {
      position: relative; z-index: 2;
    }
    .team-photo .meta .neighborhood {
      font-size: 10px; letter-spacing: 0.14em; color: var(--sage); margin-bottom: 2px;
    }
    .team-photo .meta .name {
      font-size: 21px; font-weight: 500; line-height: 1; color: var(--cream);
    }
    .team-photo.featured-photo .meta .neighborhood { color: rgba(13,59,64,0.7); }
    .team-photo.featured-photo .meta .name { color: var(--teal-900); }

    .team-card-body { padding: 14px 16px; }
    .team-motto {
      font-size: 12px; font-style: italic; color: var(--sage);
      line-height: 1.5; margin-bottom: 10px;
    }
    .team-stats {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--sage-300);
      letter-spacing: 0.1em;
      border-top: 1px solid rgba(245,235,212,0.08);
      padding-top: 10px;
    }
    .team-stats .record { color: var(--cream); }
    .team-stats .record.gold { color: var(--gold); }

    .upload-note {
      padding: 0 var(--gutter) 28px;
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 0.14em; color: var(--sage-300);
    }
    .upload-note .dot { width: 5px; height: 5px; background: var(--gold); }

    @media (max-width: 900px) {
      .teams-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 540px) {
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="teams">
  <div data-partial="nav"></div>
  <div data-partial="ticker"></div>

  <header class="page-header">
    <span class="kicker">Summer 2026 · Six Teams</span>
    <h1 class="h1">Meet the table.</h1>
    <p class="lede" style="margin-bottom: 28px;">
      Six teams, Tuesdays at 6:30pm, from the South Bay to the Eastside. Every team plays every other team once before rivalry week and the cup.
    </p>
  </header>

  <section class="container" style="padding-bottom: 12px;">
    <div class="teams-grid" id="teams-grid"><!-- rendered by JS --></div>
  </section>

  <div class="upload-note container">
    <span class="dot"></span>
    <span>Captains: upload a team photo from your captain dashboard — it replaces the monogram.</span>
  </div>

  <div data-partial="footer"></div>

  <script src="/js/partials.js"></script>
  <script>
    // ─── Sample team data — wire to /api/public-data when ready ───
    const TEAMS = [
      {
        slug: 'pier-pressure', name: 'Pier Pressure', monogram: 'PP',
        neighborhood: 'HERMOSA · SOUTH BAY', captain: 'M. Ramirez',
        record: '3W 0T 1L', rank: 2, points: 6, motto: 'We dink under stress.',
        bgGradient: 'linear-gradient(135deg, #1A5560 0%, #0D3B40 60%, #082227 100%)',
        photo: null
      },
      {
        slug: 'salty-servers', name: 'Salty Servers', monogram: 'SS',
        neighborhood: 'MANHATTAN · SOUTH BAY', captain: 'J. Nguyen',
        record: '4W 0T 0L', rank: 1, points: 8, motto: 'Soft hands, salty attitude.',
        bgGradient: 'linear-gradient(135deg, #E8B542 0%, #A47A0E 55%, #0D3B40 100%)',
        photo: null, featured: true
      },
      {
        slug: 'kitchen-sink', name: 'The Kitchen Sink', monogram: 'KS',
        neighborhood: 'REDONDO · SOUTH BAY', captain: 'A. Patel',
        record: '2W 0T 2L', rank: 3, points: 4, motto: 'Everything but the win.',
        bgGradient: 'linear-gradient(135deg, #2A4158 0%, #0D3B40 55%, #082227 100%)',
        photo: null
      },
      {
        slug: 'dinks-and-drinks', name: 'Dinks & Drinks', monogram: 'DD',
        neighborhood: 'TORRANCE', captain: 'R. Thompson',
        record: '1W 1T 2L', rank: 4, points: 3, motto: 'Beer league, A+ effort.',
        bgGradient: 'linear-gradient(135deg, #4A5B3E 0%, #2C3E2E 55%, #0D3B40 100%)',
        photo: null
      },
      {
        slug: 'net-profits', name: 'Net Profits', monogram: 'NP',
        neighborhood: 'PALOS VERDES', captain: 'D. Kim',
        record: '1W 0T 3L', rank: 5, points: 2, motto: 'Always in the green.',
        bgGradient: 'linear-gradient(135deg, #6B3F52 0%, #3E2638 55%, #0D3B40 100%)',
        photo: null
      },
      {
        slug: 'smash-brothers', name: 'Smash Brothers', monogram: 'SB',
        neighborhood: 'HERMOSA · SOUTH BAY', captain: 'T. Walsh',
        record: '0W 1T 3L', rank: 6, points: 1, motto: 'Less dink, more smash.',
        bgGradient: 'linear-gradient(135deg, #3D3A5A 0%, #23223E 55%, #0D3B40 100%)',
        photo: null
      },
    ];

    function renderTeams() {
      const grid = document.getElementById('teams-grid');
      const html = TEAMS.map(t => {
        const featuredCard = t.featured ? 'featured' : '';
        const featuredPhoto = t.featured ? 'featured-photo' : '';
        const badgeHTML = t.featured
          ? `<div class="featured-stripe">#${t.rank} · UNDEFEATED</div>`
          : `<div class="badge ${t.rank <= 2 ? 'badge-gold' : ''}">#${t.rank} · ${t.points} PT${t.points === 1 ? '' : 'S'}</div>`;

        const photoBG = t.photo
          ? `<div class="bg-gradient" style="background: url('${t.photo}') center/cover no-repeat;"></div>`
          : `<div class="bg-gradient" style="background: ${t.bgGradient};"></div><div class="monogram">${t.monogram}</div>`;

        const recordClass = (t.rank === 1) ? 'gold' : '';

        return `
          <a href="/team.html?slug=${t.slug}" class="team-card ${featuredCard}">
            <div class="team-photo ${featuredPhoto}">
              ${photoBG}
              ${badgeHTML}
              <div class="meta">
                <div class="neighborhood">${t.neighborhood}</div>
                <div class="name">${t.name}</div>
              </div>
            </div>
            <div class="team-card-body">
              <div class="team-motto">"${t.motto}"</div>
              <div class="team-stats">
                <span>CAPT · ${t.captain}</span>
                <span class="record ${recordClass}">${t.record}</span>
              </div>
            </div>
          </a>
        `;
      }).join('');
      grid.innerHTML = html;
    }

    renderTeams();
  </script>
</body>
</html>
