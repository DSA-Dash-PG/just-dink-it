<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team — The Dink Society</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/shared.css" />
  <style>
    .team-hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 32px var(--gutter) 16px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      align-items: stretch;
    }
    .team-hero-photo {
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-sm);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      padding: 24px;
    }
    .team-hero-photo .bg { position: absolute; inset: 0; z-index: 0; }
    .team-hero-photo .monogram {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 140px; font-weight: 500; letter-spacing: -0.05em;
      color: rgba(245,235,212,0.13);
      z-index: 1;
    }
    .team-hero-photo.featured .monogram { color: rgba(13,59,64,0.18); }
    .team-hero-photo .meta { position: relative; z-index: 2; }
    .team-hero-photo .neighborhood {
      font-size: 11px; letter-spacing: 0.18em; color: var(--sage); margin-bottom: 4px;
    }
    .team-hero-photo.featured .neighborhood { color: rgba(13,59,64,0.7); }
    .team-hero-photo .name {
      font-size: 38px; font-weight: 500; letter-spacing: -0.02em; line-height: 1;
      color: var(--cream);
    }
    .team-hero-photo.featured .name { color: var(--teal-900); }
    .team-hero-photo .badge {
      position: absolute; top: 16px; left: 16px;
      background: rgba(245,235,212,0.92);
      color: var(--teal-900);
      padding: 5px 12px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
      border-radius: var(--radius-sm);
      z-index: 3;
    }
    .team-hero-photo .badge.gold { background: var(--gold); }

    .team-hero-info { display: flex; flex-direction: column; gap: 14px; justify-content: space-between; }
    .team-hero-info .motto {
      font-size: 18px; font-style: italic; color: var(--gold);
      line-height: 1.4;
    }
    .team-hero-info .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .team-hero-info .stat-box {
      background: rgba(245,235,212,0.04);
      border: 1px solid rgba(245,235,212,0.1);
      padding: 14px 16px;
      border-radius: var(--radius-sm);
    }
    .team-hero-info .stat-box .num { font-size: 26px; font-weight: 500; line-height: 1; color: var(--cream); }
    .team-hero-info .stat-box .num.gold { color: var(--gold); }
    .team-hero-info .stat-box .lbl { font-size: 9px; letter-spacing: 0.18em; color: var(--sage); margin-top: 6px; text-transform: uppercase; }

    .team-hero-info .captain-row {
      padding: 14px 16px;
      background: rgba(232,181,66,0.08);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      display: flex; align-items: center; gap: 12px;
    }
    .team-hero-info .captain-row .lbl {
      font-size: 9px; letter-spacing: 0.2em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 2px;
    }
    .team-hero-info .captain-row .name { font-size: 14px; font-weight: 500; }

    .team-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px var(--gutter);
    }
    .team-section h2 {
      font-size: 11px; letter-spacing: 0.22em; color: var(--gold);
      margin-bottom: 16px; text-transform: uppercase;
    }

    .roster-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .roster-card {
      padding: 14px 16px;
      background: rgba(245,235,212,0.04);
      border: 1px solid rgba(245,235,212,0.1);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; gap: 12px;
    }
    .roster-card .name { font-size: 13px; font-weight: 500; line-height: 1.2; }
    .roster-card .meta { font-size: 10px; color: var(--sage); letter-spacing: 0.08em; margin-top: 2px; }
    .roster-card.captain {
      background: rgba(232,181,66,0.08);
      border-color: rgba(232,181,66,0.3);
    }

    .schedule-grid {
      display: flex; flex-direction: column; gap: 6px;
    }
    .schedule-row {
      padding: 12px 16px;
      background: rgba(245,235,212,0.04);
      border-radius: var(--radius-sm);
      display: grid;
      grid-template-columns: 80px 1fr auto auto;
      gap: 16px;
      align-items: center;
    }
    .schedule-row .week { font-size: 10px; letter-spacing: 0.18em; color: var(--sage); }
    .schedule-row .opp { font-size: 13px; font-weight: 500; }
    .schedule-row .opp .vs { color: var(--sage-300); font-weight: 400; }
    .schedule-row .result { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; }
    .schedule-row .result.W { color: var(--gold); }
    .schedule-row .result.L { color: var(--tan); }
    .schedule-row .result.T { color: var(--sage); }
    .schedule-row .result.upcoming { color: var(--sage-300); font-weight: 400; }
    .schedule-row .score { font-size: 11px; color: var(--sage); }

    @media (max-width: 800px) {
      .team-hero { grid-template-columns: 1fr; }
      .roster-grid { grid-template-columns: 1fr 1fr; }
      .schedule-row { grid-template-columns: 60px 1fr auto; }
      .schedule-row .score { display: none; }
    }
  </style>
</head>
<body data-page="teams">
  <div data-partial="nav"></div>
  <div data-partial="ticker"></div>

  <div style="max-width: var(--max-w); margin: 0 auto; padding: 24px var(--gutter) 0;">
    <a href="/teams.html" style="font-size: 11px; letter-spacing: 0.14em; color: var(--sage); text-transform: uppercase;">← All teams</a>
  </div>

  <header class="team-hero">
    <div class="team-hero-photo" id="hero-photo">
      <!-- JS fills this -->
    </div>

    <div class="team-hero-info">
      <div>
        <div class="kicker" id="hero-kicker" style="display: block; margin-bottom: 14px;">SUMMER 2026 · #1 OVERALL</div>
        <div class="motto" id="hero-motto">"Soft hands, salty attitude."</div>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="num gold" id="stat-record">4–0</div><div class="lbl">Record</div></div>
        <div class="stat-box"><div class="num gold" id="stat-pts">8</div><div class="lbl">Match points</div></div>
        <div class="stat-box"><div class="num" id="stat-diff">+32</div><div class="lbl">Differential</div></div>
        <div class="stat-box"><div class="num" id="stat-comp">87</div><div class="lbl">Team composite</div></div>
      </div>

      <div class="captain-row">
        <div class="avatar avatar-md" id="captain-avatar">JN</div>
        <div>
          <div class="lbl">Captain</div>
          <div class="name" id="captain-name">James Nguyen</div>
        </div>
      </div>
    </div>
  </header>

  <section class="team-section">
    <h2>Roster</h2>
    <div class="roster-grid" id="roster-grid"><!-- JS --></div>
  </section>

  <section class="team-section">
    <h2>Season schedule</h2>
    <div class="schedule-grid" id="schedule-grid"><!-- JS --></div>
  </section>

  <div data-partial="footer"></div>

  <script src="/js/partials.js"></script>
  <script>
    // ─── Sample team data — keyed by slug. Wire to API later. ───
    const TEAM_DATA = {
      'salty-servers': {
        name: 'Salty Servers', monogram: 'SS', neighborhood: 'MANHATTAN · SOUTH BAY',
        motto: 'Soft hands, salty attitude.',
        captain: { name: 'James Nguyen', monogram: 'JN' },
        record: '4–0', pts: 8, diff: '+32', composite: 87, rank: 1, featured: true,
        bgGradient: 'linear-gradient(135deg, #E8B542 0%, #A47A0E 55%, #0D3B40 100%)',
        photo: null,
        roster: [
          { name: 'James Nguyen', meta: 'CAPTAIN · MD', captain: true, monogram: 'JN' },
          { name: 'Maya Ávila', meta: 'WD / MXD', monogram: 'MA' },
          { name: 'Chris Park', meta: 'MD / MXD', monogram: 'CP' },
          { name: 'Hana Sato', meta: 'WD / MXD', monogram: 'HS' },
          { name: 'Tom Bradley', meta: 'MD', monogram: 'TB' },
          { name: 'Lily Chen', meta: 'WD / MXD', monogram: 'LC' },
        ],
        schedule: [
          { week: 'WK 1', opp: 'Net Profits', vs: 'vs', result: 'W', score: '4–0' },
          { week: 'WK 2', opp: 'Smash Brothers', vs: 'vs', result: 'W', score: '4–1' },
          { week: 'WK 3', opp: 'Dinks & Drinks', vs: '@', result: 'W', score: '3–1' },
          { week: 'WK 4', opp: 'Pier Pressure', vs: 'vs', result: 'upcoming', score: 'TONIGHT' },
          { week: 'WK 5', opp: 'Kitchen Sink', vs: '@', result: 'upcoming', score: 'JUN 16' },
          { week: 'WK 6', opp: 'TBD · Rivalry', vs: '', result: 'upcoming', score: 'JUN 23' },
          { week: 'WK 7', opp: 'TBD · 🏆 Cup', vs: '', result: 'upcoming', score: 'JUN 30' },
        ],
      },
      'pier-pressure': {
        name: 'Pier Pressure', monogram: 'PP', neighborhood: 'HERMOSA · SOUTH BAY',
        motto: 'We dink under stress.',
        captain: { name: 'Marcus Ramirez', monogram: 'MR' },
        record: '3–1', pts: 6, diff: '+18', composite: 78, rank: 2,
        bgGradient: 'linear-gradient(135deg, #1A5560 0%, #0D3B40 60%, #082227 100%)',
        roster: [
          { name: 'Marcus Ramirez', meta: 'CAPTAIN · MD', captain: true, monogram: 'MR' },
          { name: 'Sofia Tanaka', meta: 'WD / MXD', monogram: 'ST' },
          { name: 'Kai Brennan', meta: 'MD', monogram: 'KB' },
          { name: 'Nina Adams', meta: 'WD / MXD', monogram: 'NA' },
        ],
        schedule: [
          { week: 'WK 1', opp: 'Smash Brothers', vs: 'vs', result: 'W', score: '4–0' },
          { week: 'WK 2', opp: 'Kitchen Sink', vs: '@', result: 'W', score: '3–1' },
          { week: 'WK 3', opp: 'Salty Servers', vs: '@', result: 'L', score: '1–3' },
          { week: 'WK 4', opp: 'Salty Servers', vs: 'vs', result: 'upcoming', score: 'TONIGHT' },
        ],
      },
    };

    // Get slug from URL
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || 'salty-servers';
    const team = TEAM_DATA[slug] || TEAM_DATA['salty-servers'];

    document.title = `${team.name} — The Dink Society`;

    // Render hero photo
    (function renderHero() {
      const el = document.getElementById('hero-photo');
      if (team.featured) el.classList.add('featured');
      const photoBG = team.photo
        ? `<div class="bg" style="background: url('${team.photo}') center/cover no-repeat;"></div>`
        : `<div class="bg" style="background: ${team.bgGradient};"></div><div class="monogram">${team.monogram}</div>`;
      const badgeClass = team.rank <= 2 ? 'badge gold' : 'badge';
      const badgeText = team.rank === 1 && team.record.startsWith(team.record.split('–')[0]) && team.record.endsWith('0')
        ? `#${team.rank} · UNDEFEATED`
        : `#${team.rank} OVERALL`;
      el.innerHTML = `
        ${photoBG}
        <div class="${badgeClass}">${badgeText}</div>
        <div class="meta">
          <div class="neighborhood">${team.neighborhood}</div>
          <div class="name">${team.name}</div>
        </div>
      `;

      document.getElementById('hero-kicker').textContent = `SUMMER 2026 · #${team.rank} OVERALL`;
      document.getElementById('hero-motto').textContent = `"${team.motto}"`;
      document.getElementById('stat-record').textContent = team.record;
      document.getElementById('stat-pts').textContent = team.pts;
      document.getElementById('stat-diff').textContent = team.diff;
      document.getElementById('stat-comp').textContent = team.composite;
      document.getElementById('captain-name').textContent = team.captain.name;
      document.getElementById('captain-avatar').textContent = team.captain.monogram;
    })();

    // Roster
    (function renderRoster() {
      const html = team.roster.map(p => {
        const slug = (p.slug || p.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''));
        return `
          <a href="/player.html?slug=${slug}" class="roster-card ${p.captain ? 'captain' : ''}" style="text-decoration: none; color: inherit;">
            <div class="avatar avatar-sm">${p.monogram}</div>
            <div>
              <div class="name">${p.name}</div>
              <div class="meta">${p.meta}</div>
            </div>
          </a>
        `;
      }).join('');
      document.getElementById('roster-grid').innerHTML = html;
    })();

    // Schedule
    (function renderSchedule() {
      const html = team.schedule.map(s => `
        <div class="schedule-row">
          <span class="week">${s.week}</span>
          <span class="opp"><span class="vs">${s.vs}</span> ${s.opp}</span>
          <span class="result ${s.result}">${s.result === 'upcoming' ? '—' : s.result}</span>
          <span class="score">${s.score}</span>
        </div>
      `).join('');
      document.getElementById('schedule-grid').innerHTML = html;
    })();
  </script>
</body>
</html>
