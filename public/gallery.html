<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos — Just Dink It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <section style="padding: 48px 0;">
    <div class="container">
      <p class="eyebrow">From the courts</p>
      <h1 class="h-display" style="font-size: 44px; margin-top: 6px;">Action photos. <em>Every match.</em></h1>
      <p class="text-soft mt-16">Photos from each game-night, free for players to download and share.</p>

      <div class="card text-center mt-32" style="padding: 60px;">
        <p style="font-family: var(--font-serif); font-style: italic; font-size: 28px; color: var(--c-ink-soft);">Coming June 1.</p>
        <p class="text-mute mt-8" style="font-size: 13px;">Photo gallery launches with the season opener.</p>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script type="module">
    import { mountChrome } from '/js/shared.js';
    mountChrome('gallery');
  </script>
</body>
</html>
